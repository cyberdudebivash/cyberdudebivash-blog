<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a6fc4"/>
      <stop offset="100%" stop-color="#0d4a8a"/>
    </radialGradient>
    <linearGradient id="ring1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9933"/>
      <stop offset="50%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#138808"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Outer glow ring -->
  <circle cx="100" cy="100" r="96" fill="none" stroke="#00ffe0" stroke-width="1" opacity="0.3"/>

  <!-- Indian flag gradient ring -->
  <circle cx="100" cy="100" r="88" fill="none" stroke="url(#ring1)" stroke-width="8" opacity="0.9"/>

  <!-- Inner dark circle -->
  <circle cx="100" cy="100" r="78" fill="url(#bg)"/>

  <!-- Hex grid dots (background tech feel) -->
  <g opacity="0.15" fill="#00ffe0">
    <circle cx="60" cy="55" r="2"/><circle cx="80" cy="48" r="2"/><circle cx="100" cy="52" r="2"/>
    <circle cx="120" cy="48" r="2"/><circle cx="140" cy="55" r="2"/>
    <circle cx="50" cy="75" r="2"/><circle cx="150" cy="75" r="2"/>
    <circle cx="55" cy="140" r="2"/><circle cx="145" cy="140" r="2"/>
    <circle cx="65" cy="158" r="2"/><circle cx="135" cy="158" r="2"/>
  </g>

  <!-- Circuit lines -->
  <g stroke="#00ffe0" stroke-width="1.5" opacity="0.5" fill="none">
    <!-- Top left -->
    <polyline points="72,72 60,72 55,65"/>
    <circle cx="55" cy="65" r="3" fill="#00ffe0"/>
    <!-- Top right -->
    <polyline points="128,72 140,72 145,65"/>
    <circle cx="145" cy="65" r="3" fill="#00ffe0"/>
    <!-- Bottom left -->
    <polyline points="75,138 60,138 55,145"/>
    <circle cx="55" cy="145" r="3" fill="#00ffe0"/>
    <!-- Bottom right -->
    <polyline points="125,138 140,138 145,145"/>
    <circle cx="145" cy="145" r="3" fill="#00ffe0"/>
    <!-- Center connecting lines from shield -->
    <line x1="100" y1="68" x2="100" y2="55"/>
    <circle cx="100" cy="53" r="3" fill="#00ffe0"/>
  </g>

  <!-- Shield body -->
  <path d="M100 72 L128 82 L128 108 Q128 130 100 145 Q72 130 72 108 L72 82 Z"
        fill="#0a1628" stroke="#00ffe0" stroke-width="2" filter="url(#glow)"/>

  <!-- Keyhole / lock icon inside shield -->
  <g fill="#00ffe0" filter="url(#glow)">
    <!-- Lock circle top -->
    <circle cx="100" cy="103" r="11" fill="none" stroke="#00ffe0" stroke-width="2.5"/>
    <!-- Keyhole hole -->
    <circle cx="100" cy="103" r="4" fill="#00ffe0"/>
    <!-- Keyhole stem -->
    <rect x="97" y="103" width="6" height="10" rx="2" fill="#00ffe0"/>
  </g>

  <!-- Circuit nodes on shield -->
  <g fill="#00ffe0" opacity="0.7">
    <circle cx="82" cy="88" r="2.5"/>
    <circle cx="118" cy="88" r="2.5"/>
    <circle cx="78" cy="112" r="2.5"/>
    <circle cx="122" cy="112" r="2.5"/>
  </g>
  <g stroke="#00ffe0" stroke-width="1" opacity="0.4" fill="none">
    <line x1="82" y1="88" x2="88" y2="98"/>
    <line x1="118" y1="88" x2="112" y2="98"/>
    <line x1="78" y1="112" x2="85" y2="108"/>
    <line x1="122" y1="112" x2="115" y2="108"/>
  </g>

  <!-- Second outer ring (cyan) -->
  <circle cx="100" cy="100" r="93" fill="none" stroke="#00ffe0" stroke-width="0.5" opacity="0.2" stroke-dasharray="4 6"/>
</svg>
